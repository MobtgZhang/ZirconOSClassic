# ZirconOS Classic — Build Configuration
# 本文件为 GNU Make 语法，由 Makefile 通过 `-include build.conf` 读取。
# 也可通过环境变量或命令行覆盖，例如：make ARCH=aarch64 DESKTOP=none
#
# 差异：本产品线仅使用 ZBM，不使用 GRUB（见 README / docs/DEVELOPMENT.md）。

# ── Architecture ──
# 支持：x86_64, aarch64, riscv64, loongarch64, mips64el
ARCH = x86_64

# ── Boot Method ──
# mbr — Legacy BIOS（ZBM stage2 + MBR/VBR）
# uefi — UEFI（GPT + ESP，zbmfw.efi）
BOOT_METHOD = uefi

# ── Bootloader ──
# 仅 zbm — ZirconOS Boot Manager（Classic 不支持 grub）
BOOTLOADER = zbm

# ── Desktop Theme（传给 zig -Ddefault_desktop，ZBM 菜单 cmdline）──
# ntclassic — NT 5.0 / Windows 2000 Classic（本仓库默认产品线）
# classic   — 泛经典主题
# none      — 无图形 shell 提示
# luna,aero,modern,fluent,sunvalley — 预留与上游 ZirconOS 命名一致
DESKTOP = ntclassic

# ── Build Optimization ──
# Debug | ReleaseSafe | ReleaseFast | ReleaseSmall
OPTIMIZE = Debug

# ── Display / QEMU（make / make run）──
RESOLUTION = 1024x768x32
# loongarch64 + qemu-system-loongarch64：virt 机型要求内存 >1GiB，脚本会将 512M/1G 自动升为 2G；也可直接写 2G
QEMU_MEM = 512M
# 宿主机无 KVM 时 QEMU 会回退 tcg（qemu-system 支持 accel=kvm:tcg）；LoongArch 运行见 qemu_run.sh（默认 tcg）
QEMU_ACCEL = kvm:tcg
# 传给 qemu_run.sh 的额外参数，例如: -display none
QEMU_EXTRA =
# EDK2 Nightly 固件目录与镜像源（见 <https://retrage.github.io/edk2-nightly/>）
EDK2_NIGHTLY_DIR = firmware/edk2-nightly
EDK2_BASE_URL = https://retrage.github.io/edk2-nightly/bin
# LoongArch qemu virt：龙芯官方固件目录（见 firmware/loongarch-virt/README.md）
LOONGARCH_FW_DIR = firmware/loongarch-virt
# 临时 FAT ESP（由 make run 生成，distclean 可删）
ESP_ROOT = build/qemu-esp

# ── Features ──
# 与 zig build -Denable_idt= 一致（主要为 x86_64 IDT/定时器桩）
ENABLE_IDT = true
# 与 zig build -Ddebug= 一致；亦可用 DEBUG_LOG（与上游 ZirconOS 对齐）
DEBUG_LOG = true
